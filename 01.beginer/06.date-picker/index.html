<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Picker</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        main {
            max-width: 600px;
            margin: 0 auto;
            height: 70vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        p {
            font-size: 1.2em;
            text-align: center;
            color: #555;
        }

        input[type="date"] {
            padding: 10px;
            font-size: 1em;
            border: 2px solid #ccc;
            border-radius: 4px;
        }

      

    </style>

</head>
<body>

    <main>

        <h1>Date Picker</h1>
        <p>Hey How you doing, How about we see you at the date below.</p>
        <input type="date" id="datePicker" name="datePicker">
        

    </main>
    
</body>
</html>
